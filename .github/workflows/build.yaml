name: Build and Push

on:
  push:
    branches:
      - master
    paths:
      - 'apps/my_kubelab_pseudo_app/app/**'
      - 'apps/my_kubelab_pseudo_app/Dockerfile'
      - 'apps/my_kubelab_pseudo_app/requirements.txt'
    workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kubelab-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/my_kubelab_pseudo_app
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update image tag in values.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/tag: .*/tag: \"${SHORT_SHA}\"/" apps/my_kubelab_pseudo_app/values.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/my_kubelab_pseudo_app/values.yaml
          git commit -m "ci: update kubelab-app image tag to ${SHORT_SHA}"
          git push
