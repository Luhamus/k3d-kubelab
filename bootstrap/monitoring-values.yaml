grafana:
  adminUser: admin
  adminPassword: changeme
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.local
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard # watches ConfigMap with this label

alertmanager:
  enabled: false

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.local
  prometheusSpec:
    ingress:
      enabled: true
    retention: 7d
    retentionSize: 5GB
    resources:
      requests:
        memory: 400Mi
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
