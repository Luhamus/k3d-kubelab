apiVersion: v1
kind: ConfigMap
metadata:
  name: kubelab-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kubelab-app.json: |
    {
      "title": "Kubelab App",
      "uid": "kubelab-app",
      "panels": [
        {
          "title": "Request Rate",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "rate(app_requests_total[5m])",
              "legendFormat": "{{endpoint}} - {{status}}"
            }
          ]
        },
        {
          "title": "Request Latency (p99)",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(app_request_latency_seconds_bucket[5m]))",
              "legendFormat": "{{endpoint}}"
            }
          ]
        },
        {
          "title": "Total Requests by Endpoint",
          "type": "stat",
          "gridPos": {"h": 4, "w": 24, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "sum by (endpoint) (app_requests_total)",
              "legendFormat": "{{endpoint}}"
            }
          ]
        }
      ],
      "schemaVersion": 16,
      "version": 1
    }
