apiVersion: v1
kind: Service
metadata:
  name: {{ include "linkding.name" . }}-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "linkding.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "linkding.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 9090
