apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubelab-app.name" . }}-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubelab-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kubelab-app.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 8080
      name: http
